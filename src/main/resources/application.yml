server:
  port: 8083

spring:
  application:
    name: ces-erp
  datasource:
    url: jdbc:postgresql://localhost:5434/ces_erp
    username: ces_user
    password: ces_password
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6381
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: serxan.babayev.06@gmail.com
    password: "klmp yxwd jtdz ptmn"
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ces-erp-super-secret-key-minimum-256-bit-length-required-here
    access-token-expiry: 86400000
    refresh-token-expiry: 604800000
  upload:
    # ${user.home} həm macOS (/Users/<name>), həm Windows (C:\Users\<name>) avtomatik resolve edir
    # CES_UPLOAD_DIR ENV verilibsə onu istifadə edir (Docker/prod üçün override)
    dir: ${CES_UPLOAD_DIR:${user.home}/ces-uploads}
  frontend:
    url: http://localhost:3000

logging:
  level:
    com.ces.erp: DEBUG