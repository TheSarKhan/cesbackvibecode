name: Deploy Backend

on:
  push:
    branches: ["*"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER2_SSH_HOST }}
          username: ${{ secrets.SERVER2_SSH_USER }}
          key: ${{ secrets.SERVER2_BACKEND_KEY }}
          script: |
            cd /opt/cesapp
            git -C backend pull
            docker compose up -d --build backend
            echo "Backend deploy tamamlandı!"

      - name: Telegram - Uğurlu
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Backend Deploy Ugurlu!%0ABranch: ${{ github.ref_name }}%0AKim: ${{ github.actor }}%0AWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Telegram - Uğursuz
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Backend Deploy Ugursuz!%0ABranch: ${{ github.ref_name }}%0AKim: ${{ github.actor }}%0AWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
